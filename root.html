<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taerea · Root</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100vw;
    height: 100vw;
    overflow: hidden;
    background: #fff;
    font-family: 'Inter', sans-serif;
    color: #0d0d0d;
  }

  .root-shop {
    width: 100vw;
    height: 100vw;
    display: grid;
    grid-template-rows: 8vw 1fr 8vw;
    overflow: hidden;
    border: 1px solid #0d0d0d;
  }

  /* ── HEADER ── */
  .shop-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 3vw;
    border-bottom: 1px solid #0d0d0d;
  }

  .brand {
    font-weight: 200;
    font-size: 1.8vw;
    letter-spacing: 0.4em;
    text-transform: uppercase;
  }

  .accent-dot {
    color: #9b8ea0;
    font-size: 1.8vw;
    font-weight: 200;
    margin: 0 0.6vw;
  }

  .category {
    font-weight: 200;
    font-size: 1.8vw;
    letter-spacing: 0.4em;
    text-transform: uppercase;
  }

  .header-right {
    font-weight: 200;
    font-size: 1vw;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #888;
  }

  /* ── ASYMMETRIC HERO GRID ── */
  .product-grid {
    display: grid;
    grid-template-columns: 62vw 1fr;
    grid-template-rows: 1fr;
    gap: 0;
    overflow: hidden;
  }

  /* ── HERO CARD (left, full height) ── */
  .card-hero {
    position: relative;
    border-right: 1px solid #0d0d0d;
    cursor: crosshair;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transform-style: preserve-3d;
    will-change: transform;
  }

  .card-img-wrap {
    flex: 1 1 0;
    position: relative;
    overflow: hidden;
  }

  /* ── ROOT GLOW: faint accent light rising from the base ── */
  .card-img-wrap::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 60%;
    background: radial-gradient(ellipse at 50% 100%, rgba(155, 142, 160, 0.35) 0%, rgba(155, 142, 160, 0) 70%);
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
    z-index: 1;
  }

  .card-hero:hover .card-img-wrap::after,
  .card-small:hover .card-img-wrap::after {
    opacity: 1;
  }

  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: filter 0.4s ease;
    animation: ken-burns-hero 26s ease-in-out infinite alternate;
  }

  .card-hero:hover .card-img {
    filter: brightness(0.85);
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 2;
  }

  .card-hero:hover .card-overlay {
    opacity: 1;
  }

  @keyframes ken-burns-hero {
    from { transform: scale(1); }
    to   { transform: scale(1.04); }
  }

  @keyframes card-enter {
    from {
      opacity: 0;
      transform: translateY(1.4vw);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .card-hero,
  .card-small {
    opacity: 0;
    animation: card-enter 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .card-hero {
    animation-delay: 0ms;
  }

  .card-stack .card-small:nth-child(1) { animation-delay: 100ms; }
  .card-stack .card-small:nth-child(2) { animation-delay: 200ms; }
  .card-stack .card-small:nth-child(3) { animation-delay: 300ms; }

  .overlay-label {
    color: #9b8ea0;
    font-weight: 200;
    font-size: 1.1vw;
    letter-spacing: 0.4em;
    text-transform: uppercase;
  }

  /* Hero meta: outside card, below image, on white */
  .card-hero .card-meta-ext {
    flex: 0 0 auto;
    padding: 1.6vw 2.5vw 1.8vw;
    display: flex;
    align-items: baseline;
    gap: 1.2vw;
    border-top: 1px solid #0d0d0d;
  }

  .product-name {
    font-weight: 300;
    font-size: 1.5vw;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    transition: color 0.4s ease;
  }

  .meta-sep {
    font-weight: 200;
    font-size: 1.2vw;
    color: #9b8ea0;
    flex-shrink: 0;
  }

  .product-price {
    font-weight: 200;
    font-size: 1.2vw;
    letter-spacing: 0.1em;
    transition: color 0.4s ease;
    flex-shrink: 0;
  }

  .product-desc {
    font-weight: 200;
    font-size: 0.9vw;
    letter-spacing: 0.08em;
    color: #888;
    line-height: 1.5;
    margin-left: auto;
    transition: color 0.4s ease;
  }

  .card-hero:hover .product-name,
  .card-hero:hover .product-price {
    color: #9b8ea0;
  }

  .card-hero:hover .product-desc {
    color: #9b8ea0;
    opacity: 0.7;
  }

  /* ── RIGHT COLUMN (three stacked cards) ── */
  .card-stack {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* top: 2:3 portrait — tallest */
  .card-small:nth-child(1) {
    flex: 0 0 50%;
  }

  /* middle: 1:1 square */
  .card-small:nth-child(2) {
    flex: 0 0 26%;
  }

  /* bottom: 16:9 landscape — flattest */
  .card-small:nth-child(3) {
    flex: 1 1 0;
  }

  .card-small {
    position: relative;
    border-bottom: 1px solid #0d0d0d;
    cursor: crosshair;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transform-style: preserve-3d;
    will-change: transform;
  }

  .card-small:last-child {
    border-bottom: none;
  }

  .card-small .card-img-wrap {
    flex: 1 1 0;
    position: relative;
    overflow: hidden;
  }

  .card-small .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: filter 0.4s ease;
    animation: ken-burns-small 22s ease-in-out infinite alternate;
  }

  .card-small:nth-child(2) .card-img {
    animation-duration: 24s;
  }

  .card-small:nth-child(3) .card-img {
    animation-duration: 20s;
  }

  .card-small:hover .card-img {
    filter: brightness(0.85);
  }

  @keyframes ken-burns-small {
    from { transform: scale(1); }
    to   { transform: scale(1.03); }
  }

  .card-small:hover .card-overlay {
    opacity: 1;
  }

  /* Small card meta: below image on white strip */
  .card-small .card-meta-ext {
    flex: 0 0 auto;
    padding: 0.9vw 1.6vw 1vw;
    display: flex;
    align-items: baseline;
    gap: 0.8vw;
    border-top: 1px solid #0d0d0d;
  }

  .card-small .product-name {
    font-size: 1vw;
    letter-spacing: 0.2em;
  }

  .card-small .meta-sep {
    font-size: 0.9vw;
  }

  .card-small .product-price {
    font-size: 0.9vw;
  }

  .product-category {
    margin-left: auto;
    font-weight: 200;
    font-size: 0.7vw;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #9b8ea0;
    flex-shrink: 0;
  }

  .card-small:hover .product-name,
  .card-small:hover .product-price {
    color: #9b8ea0;
  }

  .card-small:active,
  .card-hero:active {
    opacity: 0.7;
  }

  /* ── FOOTER ── */
  .shop-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 3vw;
    border-top: 1px solid #0d0d0d;
  }

  .footer-left {
    font-weight: 200;
    font-size: 1vw;
    letter-spacing: 0.35em;
    text-transform: uppercase;
  }

  .tagline {
    font-weight: 200;
    font-size: 0.9vw;
    letter-spacing: 0.3em;
    font-style: italic;
    color: #888;
  }

  .footer-nav {
    display: flex;
    align-items: center;
    gap: 2.5vw;
  }

  .footer-nav-item {
    font-weight: 200;
    font-size: 0.85vw;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #888;
    cursor: crosshair;
    transition: color 0.4s ease;
    text-decoration: none;
  }

  .footer-nav-item:hover {
    color: #9b8ea0;
  }

  .footer-nav-item.active {
    color: #0d0d0d;
  }
</style>
</head>
<body>

<div class="root-shop">

  <header class="shop-header">
    <div>
      <span class="brand">Taerea</span>
      <span class="accent-dot">·</span>
      <span class="category">Root</span>
    </div>
    <span class="header-right">4 Objects</span>
  </header>

  <main class="product-grid">

    <!-- HERO: Mineral Block -->
    <article class="card-hero">
      <div class="card-img-wrap">
        <img class="card-img depth-img" data-depth="assets/depth_disp/root_product_1_disp.png" src="assets/root_product_1.png" alt="Mineral Block"
          onerror="this.style.display='none';this.parentNode.insertAdjacentHTML('beforeend','<svg style=\'width:100%;height:100%;display:block\' viewBox=\'0 0 100 100\' preserveAspectRatio=\'none\' xmlns=\'http://www.w3.org/2000/svg\'><rect width=\'100\' height=\'100\' fill=\'#d4cdd8\'/></svg>')">
        <div class="card-overlay">
          <span class="overlay-label">View Object</span>
        </div>
      </div>
      <div class="card-meta-ext">
        <span class="product-name">Mineral Block</span>
        <span class="meta-sep">—</span>
        <span class="product-price">€68</span>
        <span class="product-desc">Raw selenite. Holds light without trying.</span>
      </div>
    </article>

    <!-- RIGHT STACK -->
    <div class="card-stack">

      <!-- Forge Hook: 2:3 portrait top -->
      <article class="card-small">
        <div class="card-img-wrap">
          <img class="card-img depth-img" data-depth="assets/depth_disp/root_product_2_disp.png" src="assets/root_product_2.png" alt="Forge Hook"
            onerror="this.style.display='none';this.parentNode.insertAdjacentHTML('beforeend','<svg style=\'width:100%;height:100%;display:block\' viewBox=\'0 0 100 100\' preserveAspectRatio=\'none\' xmlns=\'http://www.w3.org/2000/svg\'><rect width=\'100\' height=\'100\' fill=\'#2e2c30\'/></svg>')">
          <div class="card-overlay">
            <span class="overlay-label">View Object</span>
          </div>
        </div>
        <div class="card-meta-ext">
          <span class="product-name">Forge Hook</span>
          <span class="meta-sep">—</span>
          <span class="product-price">€44</span>
          <span class="product-category">Tool</span>
        </div>
      </article>

      <!-- Linen Cord: 1:1 square middle -->
      <article class="card-small">
        <div class="card-img-wrap">
          <img class="card-img depth-img" data-depth="assets/depth_disp/root_product_3_disp.png" src="assets/root_product_3.png" alt="Linen Cord"
            onerror="this.style.display='none';this.parentNode.insertAdjacentHTML('beforeend','<svg style=\'width:100%;height:100%;display:block\' viewBox=\'0 0 100 100\' preserveAspectRatio=\'none\' xmlns=\'http://www.w3.org/2000/svg\'><rect width=\'100\' height=\'100\' fill=\'#c8bb9e\'/></svg>')">
          <div class="card-overlay">
            <span class="overlay-label">View Object</span>
          </div>
        </div>
        <div class="card-meta-ext">
          <span class="product-name">Linen Cord</span>
          <span class="meta-sep">—</span>
          <span class="product-price">€22</span>
          <span class="product-category">Material</span>
        </div>
      </article>

      <!-- Brass Weight: 16:9 landscape bottom -->
      <article class="card-small">
        <div class="card-img-wrap">
          <img class="card-img depth-img" data-depth="assets/depth_disp/root_product_4_disp.png" src="assets/root_product_4.png" alt="Brass Weight"
            onerror="this.style.display='none';this.parentNode.insertAdjacentHTML('beforeend','<svg style=\'width:100%;height:100%;display:block\' viewBox=\'0 0 100 100\' preserveAspectRatio=\'none\' xmlns=\'http://www.w3.org/2000/svg\'><rect width=\'100\' height=\'100\' fill=\'#b8952a\'/></svg>')">
          <div class="card-overlay">
            <span class="overlay-label">View Object</span>
          </div>
        </div>
        <div class="card-meta-ext">
          <span class="product-name">Brass Weight</span>
          <span class="meta-sep">—</span>
          <span class="product-price">€89</span>
          <span class="product-category">Object</span>
        </div>
      </article>

    </div>

  </main>

  <footer class="shop-footer">
    <span class="footer-left">Root III</span>
    <span class="tagline">Objects that hold.</span>
    <nav class="footer-nav">
      <a class="footer-nav-item active" href="#">Mineral</a>
      <a class="footer-nav-item" href="#">Tool</a>
      <a class="footer-nav-item" href="#">Material</a>
      <a class="footer-nav-item" href="#">Object</a>
    </nav>
  </footer>

</div>

<script>
  // Cursor-reactive tilt — subtle 3D parallax on hover.
  // Hero card gets a slightly more pronounced tilt than the small stacked cards.
  (function () {
    var MAX_TILT_HERO = 3.5; // deg
    var MAX_TILT_SMALL = 2.5; // deg

    function attachTilt(el, maxTilt) {
      var raf = null;

      function onMove(e) {
        var rect = el.getBoundingClientRect();
        var x = (e.clientX - rect.left) / rect.width;  // 0..1
        var y = (e.clientY - rect.top) / rect.height;  // 0..1
        var rotateY = (x - 0.5) * 2 * maxTilt;
        var rotateX = (0.5 - y) * 2 * maxTilt;

        if (raf) cancelAnimationFrame(raf);
        raf = requestAnimationFrame(function () {
          el.style.transform =
            'perspective(60vw) rotateX(' + rotateX.toFixed(2) + 'deg) rotateY(' + rotateY.toFixed(2) + 'deg)';
        });
      }

      function onLeave() {
        if (raf) cancelAnimationFrame(raf);
        el.style.transform = 'perspective(60vw) rotateX(0deg) rotateY(0deg)';
      }

      el.addEventListener('mousemove', onMove);
      el.addEventListener('mouseleave', onLeave);
    }

    var hero = document.querySelector('.card-hero');
    if (hero) attachTilt(hero, MAX_TILT_HERO);

    document.querySelectorAll('.card-small').forEach(function (card) {
      attachTilt(card, MAX_TILT_SMALL);
    });
  })();
</script>

<script src="assets/depth_parallax.js"></script>
<script>
  window.initDepthParallax();
</script>

</body>
</html>
