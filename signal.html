<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taerea · Signal</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100vw;
  height: 100vw;
  overflow: hidden;
  background: #0a0a0a;
  font-family: 'Helvetica Neue', 'Arial', sans-serif;
}

.signal-wrap {
  width: 100vw;
  height: 100vw;
  position: relative;
  overflow: hidden;
  border: 1px solid #1a1a1a;
}

/* Static grid lines — very faint */
.grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 6.25vw 6.25vw;
  pointer-events: none;
}

/* Orange accent corner marks */
.corner {
  position: absolute;
  width: 2vw;
  height: 2vw;
}
.corner-tl { top: 2vw; left: 2vw; border-top: 1px solid #e8521a; border-left: 1px solid #e8521a; }
.corner-tr { top: 2vw; right: 2vw; border-top: 1px solid #e8521a; border-right: 1px solid #e8521a; }
.corner-bl { bottom: 2vw; left: 2vw; border-bottom: 1px solid #e8521a; border-left: 1px solid #e8521a; }
.corner-br { bottom: 2vw; right: 2vw; border-bottom: 1px solid #e8521a; border-right: 1px solid #e8521a; }

/* Floating phrases */
.phrase {
  position: absolute;
  white-space: nowrap;
  font-weight: 200;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  pointer-events: none;
  will-change: transform;
}

/* Header bar */
.header {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6vw;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 3vw;
  border-bottom: 1px solid #1a1a1a;
  z-index: 10;
}

.header-brand {
  font-size: 1.2vw;
  font-weight: 200;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: #fff;
}

.header-label {
  font-size: 0.8vw;
  font-weight: 200;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: #e8521a;
}

.header-num {
  font-size: 0.8vw;
  font-weight: 200;
  letter-spacing: 0.3em;
  color: #333;
}

/* Footer bar */
.footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 5vw;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 3vw;
  border-top: 1px solid #1a1a1a;
  z-index: 10;
}

.footer-tagline {
  font-size: 0.75vw;
  font-weight: 200;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: #444;
  font-style: italic;
}

.footer-count {
  font-size: 0.75vw;
  font-weight: 200;
  letter-spacing: 0.3em;
  color: #222;
}

/* Center anchor phrase */
.center-phrase {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  z-index: 5;
}

.center-phrase-main {
  display: block;
  font-size: 4vw;
  font-weight: 200;
  letter-spacing: 0.6em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.06);
  line-height: 1.3;
}

.center-phrase-sub {
  display: block;
  font-size: 1vw;
  font-weight: 200;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: rgba(232,82,26,0.3);
  margin-top: 2vw;
}
</style>
</head>
<body>

<div class="signal-wrap" id="wrap">

  <div class="grid"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <header class="header">
    <span class="header-brand">Taerea</span>
    <span class="header-label">Signal — V</span>
    <span class="header-num">Objects that speak</span>
  </header>

  <div class="center-phrase">
    <span class="center-phrase-main">Taerea</span>
    <span class="center-phrase-sub">Form is the message</span>
  </div>

  <!-- Floating phrases injected by JS -->

  <footer class="footer">
    <span class="footer-tagline">The object is the signal</span>
    <span class="footer-count" id="phrase-count">—</span>
  </footer>

</div>

<script>
const PHRASES = [
  { text: "Weiß trägt",        size: 1.8, speed: 0.18, color: "rgba(255,255,255,0.55)" },
  { text: "Transparent zeigt", size: 1.2, speed: 0.11, color: "rgba(255,255,255,0.30)" },
  { text: "Orange sagt",       size: 2.4, speed: 0.25, color: "rgba(232,82,26,0.70)"   },
  { text: "Settle",            size: 1.0, speed: 0.08, color: "rgba(184,169,138,0.45)" },
  { text: "Carry",             size: 1.0, speed: 0.14, color: "rgba(138,154,184,0.45)" },
  { text: "Root",              size: 1.0, speed: 0.20, color: "rgba(155,142,160,0.45)" },
  { text: "FDM / PLA",         size: 0.9, speed: 0.09, color: "rgba(255,255,255,0.18)" },
  { text: "Objects for living",size: 1.4, speed: 0.15, color: "rgba(255,255,255,0.22)" },
  { text: "Capsulation",       size: 1.1, speed: 0.12, color: "rgba(255,255,255,0.16)" },
  { text: "Form is the message",size: 0.9,speed: 0.07, color: "rgba(232,82,26,0.35)"  },
  { text: "Haptisch",          size: 1.3, speed: 0.17, color: "rgba(255,255,255,0.20)" },
  { text: "Persönlich",        size: 1.3, speed: 0.13, color: "rgba(255,255,255,0.20)" },
  { text: "Anziehend",         size: 1.3, speed: 0.19, color: "rgba(255,255,255,0.20)" },
  { text: "Das Zuhause setzen",size: 0.85,speed: 0.06, color: "rgba(255,255,255,0.12)" },
  { text: "Das Zuhause tragen",size: 0.85,speed: 0.10, color: "rgba(255,255,255,0.12)" },
  { text: "Das Zuhause finden",size: 0.85,speed: 0.16, color: "rgba(255,255,255,0.12)" },
];

const wrap = document.getElementById('wrap');
const W = wrap.offsetWidth;
const H = wrap.offsetHeight;

const nodes = PHRASES.map((p, i) => {
  const el = document.createElement('div');
  el.className = 'phrase';
  el.textContent = p.text;
  el.style.fontSize = p.size + 'vw';
  el.style.color = p.color;

  // Random start position, avoid header/footer bands
  const margin = H * 0.08;
  let x = Math.random() * W;
  let y = margin + Math.random() * (H - margin * 2);

  // Random direction angle
  const angle = Math.random() * Math.PI * 2;
  const vx = Math.cos(angle) * p.speed;
  const vy = Math.sin(angle) * p.speed;

  // Set an initial transform immediately so the phrase is visible and
  // correctly placed before the first animation frame runs — without this,
  // absolutely-positioned elements sit at their default (top-left) box
  // until the RAF-gated tick loop below first executes, which can be
  // delayed or throttled (e.g. iframe not yet visible/scrolled into view).
  el.style.transform = `translate(${x}px, ${y}px)`;

  wrap.appendChild(el);
  return { el, x, y, vx, vy, w: 0, h: 0 };
});

document.getElementById('phrase-count').textContent = PHRASES.length + ' signals';

// Measure after render
requestAnimationFrame(() => {
  nodes.forEach(n => {
    const r = n.el.getBoundingClientRect();
    n.w = r.width;
    n.h = r.height;
  });

  const headerH = H * 0.06;
  const footerH = H * 0.05;

  function tick() {
    nodes.forEach(n => {
      n.x += n.vx;
      n.y += n.vy;

      // Bounce off walls
      if (n.x < 0) { n.x = 0; n.vx = Math.abs(n.vx); }
      if (n.x + n.w > W) { n.x = W - n.w; n.vx = -Math.abs(n.vx); }
      if (n.y < headerH) { n.y = headerH; n.vy = Math.abs(n.vy); }
      if (n.y + n.h > H - footerH) { n.y = H - footerH - n.h; n.vy = -Math.abs(n.vy); }

      n.el.style.transform = `translate(${n.x}px, ${n.y}px)`;
    });

    requestAnimationFrame(tick);
  }

  tick();
});
</script>

</body>
</html>
